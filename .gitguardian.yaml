# GitGuardian configuration — test fixtures contain intentional placeholder
# passwords that are not real secrets. Ignore them at the path level so the
# GitHub integration and ggshield CLI do not raise false positives.
version: 2
secret:
  ignored_paths:
    - "conduit-web/test/**"
    - "conduit-web/test/browser/**"
  # Also ignore the "Generic Password" detector for the spec document that
  # shows auth.json's schema with placeholder fields.
  ignored_detectors:
    - Generic Password