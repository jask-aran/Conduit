name: Static checks

on:
  workflow_dispatch:
  # Validate policy edits once; ordinary pull requests do not run Actions.
  pull_request:
    paths:
      - .github/workflows/ci.yml

jobs:
  static:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conduit-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: conduit-web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - env:
          # The committed dev host is 0.0.0.0; tests spawn the server on
          # loopback, but export the override so any non-loopback bind is open.
          CONDUIT_ALLOW_INSECURE: "1"
        run: npm test
      - run: npm run build
